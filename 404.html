<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada · ECOVOCES IA</title>
  <meta name="robots" content="noindex">
  <style>
    :root{ --accent:#0f7a49; --accent2:#0a7ea4; --text:#161a20; --text2:#586273; --mica:#f4f6f9; }
    *{box-sizing:border-box;margin:0;}
    body{min-height:100svh;display:grid;place-items:center;padding:2rem;
      font-family:'Segoe UI Variable Text','Segoe UI',system-ui,-apple-system,sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 12% -6%, rgba(15,122,73,.10), transparent 58%),
        radial-gradient(820px 520px at 100% -2%, rgba(10,126,164,.08), transparent 54%),
        linear-gradient(180deg,#f4f6f9 0%,#eef1f5 45%,#eaeef3 100%);}
    .card{max-width:34rem;text-align:center;}
    .code{font-size:clamp(4rem,16vw,8rem);font-weight:800;line-height:1;letter-spacing:-.04em;
      background:linear-gradient(120deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
    h1{font-size:clamp(1.3rem,4vw,1.8rem);margin:.6rem 0 .4rem;font-weight:700;}
    p{color:var(--text2);line-height:1.6;margin-bottom:1.6rem;}
    a{display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;font-weight:600;
      color:#fff;background:var(--accent);padding:.8rem 1.4rem;border-radius:12px;
      box-shadow:0 2px 6px rgba(16,24,40,.06),0 8px 24px rgba(16,24,40,.07);transition:transform .25s,background .25s;}
    a:hover{background:var(--accent2);transform:translateY(-2px);}
  </style>
</head>
<body>
  <main class="card">
    <div class="code" aria-hidden="true">404</div>
    <h1>Esta frecuencia no existe</h1>
    <p>La página que buscas se salió del aire. Vuelve a la portada de ECOVOCES IA para seguir escuchando el cambio.</p>
    <a href="/">Volver a la portada
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
  </main>
</body>
</html>
